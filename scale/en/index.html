  <div class="su-static-list">
    <h1 style="font-family:'Orbitron',monospace;color:#00c8ff;text-transform:uppercase;letter-spacing:.06em">Scale of the Universe</h1>
    <p style="margin:14px 0 24px;color:#bdd8f0;line-height:1.5">
      This site is an interactive scroll-zoom across 62 orders of magnitude: from the Planck length (10⁻³⁵ m)
      to the diameter of the observable Universe (≈10²⁷ m). Enable JavaScript to start the interactive experience.
      Below is a list of key objects.
    </p>
    <ul style="line-height:1.8;color:#bdd8f0;list-style:none;padding:0">
      <li><b>Planck length</b> — 1.6×10⁻³⁵ m. The smallest meaningful length scale.</li>
      <li><b>Quark</b> — &lt;10⁻¹⁹ m. A point-like fundamental particle.</li>
      <li><b>Electron</b> — &lt;10⁻¹⁸ m. Considered point-like.</li>
      <li><b>Proton</b> — 1.7×10⁻¹⁵ m. Made of three quarks.</li>
      <li><b>Hydrogen atom</b> — 1.06×10⁻¹⁰ m. The simplest, most abundant atom.</li>
      <li><b>DNA</b> — 2 nm wide. Unwound, one human's DNA reaches the Sun and back 67 times.</li>
      <li><b>3 nm transistor</b> — modern silicon chip.</li>
      <li><b>SARS-CoV-2</b> — 120 nm spiked sphere.</li>
      <li><b>E. coli bacterium</b> — 2 μm. ~10¹³ bacteria live in your body.</li>
      <li><b>Red blood cell</b> — 8 μm. ~25 trillion in your blood.</li>
      <li><b>Human cell</b> — 20 μm. ~37 trillion cells in the body.</li>
      <li><b>Human hair</b> — 70 μm thick.</li>
      <li><b>Grain of sand</b> — 0.5 mm.</li>
      <li><b>Ant</b> — 5 mm.</li>
      <li><b>Human</b> — 1.7 m. You are nearly in the middle between a quark and the observable Universe.</li>
      <li><b>Blue whale</b> — 30 m. The largest animal ever to exist on Earth.</li>
      <li><b>Eiffel Tower</b> — 330 m.</li>
      <li><b>Burj Khalifa</b> — 828 m.</li>
      <li><b>Mount Everest</b> — 8 848 m.</li>
      <li><b>Moon</b> — 3 474 km.</li>
      <li><b>Earth</b> — 12 742 km.</li>
      <li><b>Jupiter</b> — 139 820 km.</li>
      <li><b>Sun</b> — 1 392 000 km.</li>
      <li><b>Astronomical Unit</b> — 149.6 million km.</li>
      <li><b>UY Scuti</b> — 2.4×10¹² m. One of the largest known stars.</li>
      <li><b>Oort Cloud</b> — ~1 light-year from the Sun.</li>
      <li><b>Light-year</b> — 9.46×10¹⁵ m.</li>
      <li><b>Proxima Centauri</b> — 4.24 light-years away.</li>
      <li><b>Orion Nebula</b> — 24 light-years across.</li>
      <li><b>Milky Way</b> — ~100 000 light-years.</li>
      <li><b>Andromeda</b> — 2.5 million light-years from us.</li>
      <li><b>Local Group</b> — ~10 million light-years.</li>
      <li><b>Laniakea Supercluster</b> — 520 million light-years.</li>
      <li><b>Sloan Great Wall</b> — 1.4 billion light-years.</li>
      <li><b>Observable Universe</b> — 93 billion light-years across.</li>
    </ul>
  </div>
</noscript>
